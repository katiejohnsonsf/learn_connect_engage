name: Weekly Legistar Crawl

on:
  schedule:
    # Tuesdays at 1:30 AM Pacific (9:30 AM UTC)
    - cron: '30 9 * * 2'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  crawl-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit db.sqlite3 back to main
      pages: write     # needed to deploy to GitHub Pages
      id-token: write  # needed for Pages OIDC auth

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up conda environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          environment-name: learn_connect
          cache-environment: true  # uses actions/cache@v4 internally

      # Cache the OLMo model (~6 GB) so we don't re-download every week
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: huggingface-olmo-2-0425-1b-instruct

      - name: Create .env file from secrets
        run: |
          cat > .env <<EOF
          DEBUG=NO
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          OLMO_MODEL_NAME=allenai/OLMo-2-0425-1B-Instruct
          OLMO_DEVICE=cpu
          OLMO_MAX_LENGTH=2048
          CRAWL_INTERVAL_DAYS=7
          CRAWL_TIME=01:30
          EOF

      - name: Run database migrations
        shell: micromamba-shell {0}
        run: python manage.py migrate --run-syncdb

      - name: Crawl Legistar calendar
        shell: micromamba-shell {0}
        run: |
          python manage.py legistar crawl-calendar --customer seattle \
            --start $(date -d '7 days ago' +'%Y-%m-%d')

      - name: Run summarization pipeline
        shell: micromamba-shell {0}
        run: python setup_summaries.py

      - name: Build static site
        shell: micromamba-shell {0}
        run: |
          # Build site; distill copies static files to dist/Informed_Seattle/static/
          python manage.py distill-local --force --collectstatic
          # GitHub Pages strips /Informed_Seattle/ prefix, so files must also live
          # at dist/static/ to be served at /Informed_Seattle/static/
          cp -r /tmp/engage-static/. dist/static/
        env:
          BASE_URL: https://katiejohnsonsf.github.io/Informed_Seattle
          STATIC_URL: /Informed_Seattle/static/
          DEBUG: NO
          SECURE_SSL_REDIRECT: NO
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend

      - name: Commit updated database to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/db.sqlite3
          git diff --staged --quiet || git commit -m \
            "chore: weekly data update $(date +'%Y-%m-%d')"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
